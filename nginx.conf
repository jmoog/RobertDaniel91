server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Site Astro statique, format "directory" (trailingSlash: 'always').
    # Chaque page = /page/index.html ; nginx sert l'index du dossier.

    # Assets versionnés Astro : cache long.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Ajoute le slash final manquant (cohérence SEO).
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
